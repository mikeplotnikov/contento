const TAG_COLORS = {
  "Картозия": "#D63031",
  "Сессия": "#0984E3",
  "Канал": "#00B894",
  "Александр": "#E17D00",
};

function Card({ item, color, isSelected, onToggle }) {
  const tagColor = TAG_COLORS[item.tag] || "#999";
  return React.createElement("div", {
    onClick: () => onToggle(item.id),
    style: {
      padding: "8px 11px", borderRadius: 10, cursor: "pointer",
      border: isSelected ? `2.5px solid ${color}` : "2px solid #E8E8EE",
      background: isSelected ? `${color}10` : "#fff",
      transition: "all 0.15s ease", userSelect: "none",
      boxShadow: isSelected ? `0 2px 8px ${color}22` : "0 1px 3px rgba(0,0,0,0.05)",
      position: "relative",
    }
  },
    React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 6, marginBottom: 2 } },
      React.createElement("div", { style: { fontWeight: 700, fontSize: 12, color: isSelected ? color : "#2d3436", flex: 1 } }, item.label),
      item.tag && React.createElement("span", {
        style: { fontSize: 8, fontWeight: 700, color: tagColor, background: tagColor + "15", padding: "1px 6px", borderRadius: 6, whiteSpace: "nowrap" }
      }, item.tag),
      item.proven && React.createElement("span", { style: { fontSize: 9, color: "#00B894" } }, "✓")
    ),
    React.createElement("div", { style: { fontSize: 10, color: "#888", lineHeight: 1.35 } }, item.desc)
  );
}

function LayerColumn({ layer, selected, onToggle }) {
  const count = selected.filter(id => layer.items.some(i => i.id === id)).length;
  return React.createElement("div", { style: { minWidth: 0 } },
    React.createElement("div", {
      style: { display: "flex", alignItems: "center", gap: 5, marginBottom: 4, paddingBottom: 6, borderBottom: `3px solid ${layer.color}` }
    },
      React.createElement("span", { style: { fontSize: 14 } }, layer.icon),
      React.createElement("span", { style: { fontWeight: 800, fontSize: 11, color: layer.color, letterSpacing: 1 } }, layer.label),
      count > 0 && React.createElement("span", {
        style: { fontSize: 9, fontWeight: 700, color: "#fff", background: layer.color, borderRadius: 8, padding: "1px 6px", marginLeft: "auto" }
      }, count)
    ),
    React.createElement("div", { style: { fontSize: 9, color: "#aaa", marginBottom: 6, fontStyle: "italic", lineHeight: 1.3 } }, layer.subtitle),
    React.createElement("div", { style: { fontSize: 8, color: "#bbb", marginBottom: 8 } }, "Источник: " + layer.source),
    React.createElement("div", { style: { display: "flex", flexDirection: "column", gap: 4 } },
      layer.items.map(item =>
        React.createElement(Card, { key: item.id, item, color: layer.color, isSelected: selected.includes(item.id), onToggle })
      )
    )
  );
}

function Assembly({ selected, onClear }) {
  const allItems = LAYERS.flatMap(l => l.items.map(i => ({ ...i, layerColor: l.color, layerLabel: l.label, layerIcon: l.icon, layerId: l.id })));
  const picked = allItems.filter(i => selected.includes(i.id));
  const grouped = LAYERS.map(l => ({ ...l, picked: picked.filter(i => i.layerId === l.id) })).filter(g => g.picked.length > 0);

  if (picked.length === 0) {
    return React.createElement("div", {
      style: { background: "#fff", borderRadius: 14, padding: 28, textAlign: "center", border: "2px dashed #D0D0DD", minHeight: 120, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 6 }
    },
      React.createElement("div", { style: { fontSize: 32, opacity: 0.3 } }, "🧩"),
      React.createElement("div", { style: { color: "#999", fontSize: 13, fontWeight: 700 } }, "ФОРМАТ = ДВИЖОК + ХУКИ + ФОРМАТНЫЕ ЭЛЕМЕНТЫ + ТЕМА"),
      React.createElement("div", { style: { color: "#bbb", fontSize: 11, maxWidth: 420 } },
        "По Картозии: «Темы — лишь декорация для человеческих страстей». Начните с выбора ДВИЖКА, затем добавьте хуки и форматные элементы, тему выбирайте последней."
      )
    );
  }

  // Build Kartozia-style formula
  const parts = [];
  const g = (id) => grouped.find(x => x.id === id);
  if (g("engine")) parts.push(React.createElement("span", { key: "en" },
    React.createElement("strong", { style: { color: "#D63031" } }, "Движок: "),
    g("engine").picked.map(p => p.label).join(" + ")));
  if (g("hooks")) parts.push(React.createElement("span", { key: "hk" },
    React.createElement("strong", { style: { color: "#E17D00" } }, " → Хуки: "),
    g("hooks").picked.map(p => p.label).join(" + ")));
  if (g("format")) parts.push(React.createElement("span", { key: "fm" },
    React.createElement("strong", { style: { color: "#0984E3" } }, " → Формат: "),
    g("format").picked.map(p => p.label).join(" + ")));
  if (g("decor")) parts.push(React.createElement("span", { key: "dc" },
    React.createElement("strong", { style: { color: "#6C5CE7" } }, " → Тема: "),
    g("decor").picked.map(p => p.label).join(" + ")));
  if (g("context")) parts.push(React.createElement("span", { key: "cx", style: { color: "#999" } },
    " (учтено: ", g("context").picked.map(p => p.label).join(", "), ")"));

  // Warnings
  const warnings = [];
  if (!g("engine")) warnings.push("⚠️ Нет движка — формат не будет двигаться");
  if (!g("hooks")) warnings.push("💡 Добавьте хук — иначе зритель не задержится");
  if (g("decor") && !g("engine")) warnings.push("🚫 По Картозии: тема без движка = мёртвый формат");

  return React.createElement("div", {
    style: { background: "#fff", borderRadius: 14, padding: 18, border: "1px solid #E0E0EA", boxShadow: "0 4px 16px rgba(0,0,0,0.06)" }
  },
    React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 } },
      React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 8 } },
        React.createElement("span", { style: { fontSize: 16 } }, "🧩"),
        React.createElement("span", { style: { fontWeight: 800, fontSize: 14, color: "#2d3436" } }, "СОБРАННЫЙ ФОРМАТ"),
        React.createElement("span", { style: { background: "#D63031", color: "#fff", fontSize: 10, fontWeight: 700, padding: "2px 8px", borderRadius: 10 } }, picked.length + " эл.")
      ),
      React.createElement("button", { onClick: onClear, className: "no-print",
        style: { background: "#F5F6FA", border: "1px solid #ddd", color: "#888", padding: "5px 12px", borderRadius: 8, cursor: "pointer", fontSize: 11, fontWeight: 600 }
      }, "✕ Очистить")
    ),
    // Grouped pills
    React.createElement("div", { style: { display: "flex", flexWrap: "wrap", gap: 10, marginBottom: 12 } },
      grouped.map(gr => React.createElement("div", { key: gr.id, style: { flex: "1 1 150px", minWidth: 140 } },
        React.createElement("div", { style: { fontSize: 9, fontWeight: 800, color: gr.color, marginBottom: 4, letterSpacing: 1 } }, gr.icon + " " + gr.label),
        gr.picked.map(item => React.createElement("div", { key: item.id,
          style: { background: `${item.layerColor}08`, border: `1.5px solid ${item.layerColor}28`, borderRadius: 8, padding: "5px 9px", marginBottom: 3, fontSize: 11, fontWeight: 700, color: item.layerColor }
        }, item.label))
      ))
    ),
    // Warnings
    warnings.length > 0 && React.createElement("div", { style: { marginBottom: 10 } },
      warnings.map((w, i) => React.createElement("div", { key: i, style: { fontSize: 11, color: "#E17D00", fontWeight: 600, marginBottom: 2 } }, w))
    ),
    // Formula
    React.createElement("div", { style: { borderTop: "1px solid #ECECF2", paddingTop: 12, background: "#FAFBFE", borderRadius: 10, padding: 12 } },
      React.createElement("div", { style: { fontSize: 10, fontWeight: 800, color: "#D63031", marginBottom: 6, letterSpacing: 1 } }, "📐 ФОРМУЛА ФОРМАТА (по Картозии):"),
      React.createElement("div", { style: { fontSize: 12.5, color: "#333", lineHeight: 1.7 } }, ...parts)
    )
  );
}

function Legend() {
  return React.createElement("div", { className: "no-print",
    style: { display: "flex", gap: 14, justifyContent: "center", flexWrap: "wrap", marginBottom: 14 }
  },
    Object.entries(TAG_COLORS).map(([tag, color]) =>
      React.createElement("div", { key: tag, style: { display: "flex", alignItems: "center", gap: 4 } },
        React.createElement("span", { style: { width: 8, height: 8, borderRadius: 4, background: color, display: "inline-block" } }),
        React.createElement("span", { style: { fontSize: 10, color: "#888" } }, tag)
      )
    ),
    React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 4 } },
      React.createElement("span", { style: { fontSize: 10, color: "#00B894" } }, "✓"),
      React.createElement("span", { style: { fontSize: 10, color: "#888" } }, "Проверено на канале")
    )
  );
}

function App() {
  const [selected, setSelected] = useState([]);
  const toggle = useCallback(id => {
    setSelected(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
  }, []);

  return React.createElement("div", { style: { background: "#F5F6FA", minHeight: "100vh", padding: "16px 14px" } },
    React.createElement("div", { style: { maxWidth: 1360, margin: "0 auto" } },
      // Header
      React.createElement("div", { style: { textAlign: "center", marginBottom: 12 } },
        React.createElement("div", { style: { fontSize: 22, fontWeight: 900, letterSpacing: 2, color: "#1a1a2e" } }, "МЯЧ CONTENTO"),
        React.createElement("div", { style: { fontSize: 12, color: "#D63031", fontWeight: 700, marginTop: 2, letterSpacing: 1.5 } }, "КОНСТРУКТОР ФОРМАТОВ ПО МЕТОДУ КАРТОЗИИ"),
        React.createElement("div", { style: { fontSize: 11, color: "#999", marginTop: 6, maxWidth: 580, margin: "6px auto 0" } },
          "«Перестаньте думать темами — начните думать движками и форматами. Темы — лишь декорация для человеческих страстей» — Н. Картозия. Начните с движка (красный), затем хуки, форматные элементы, тему — последней."
        )
      ),
      // Legend
      React.createElement(Legend),
      // Grid: 5 columns
      React.createElement("div", { style: { display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 12, marginBottom: 16 } },
        LAYERS.map(layer =>
          React.createElement(LayerColumn, { key: layer.id, layer, selected, onToggle: toggle })
        )
      ),
      // Assembly
      React.createElement(Assembly, { selected, onClear: () => setSelected([]) })
    )
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
